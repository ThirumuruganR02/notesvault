spring.application.name=notesvault-backend

# MySQL — set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD to override
spring.datasource.url=jdbc:mysql://localhost:3306/notesvault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT — use a strong secret in production
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AES-256-GCM for note body at rest
note.encryption.secret=${NOTE_ENCRYPTION_SECRET:dev-note-encryption-secret-change-me-in-production-32chars}

# Swagger
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method
