spring.application.name=notesvault-backend

# MySQL — set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD to override
spring.datasource.url=jdbc:mysql://localhost:3306/notesvault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT — use a strong secret in production (at least 32 bytes for HS256); override with JWT_SECRET
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AES-256-GCM for note body at rest — SHA-256(secret) derives the key; override with NOTE_ENCRYPTION_SECRET in production
note.encryption.secret=${NOTE_ENCRYPTION_SECRET:dev-note-encryption-secret-change-me-in-production-32chars}
